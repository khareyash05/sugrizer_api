openapi: 3.0.0
info:
  title: Assignments API
  version: 1.0.0
  description: API for managing assignments.
paths:
  /api/assignments:
    get:
      summary: Get all assignments
      responses:
        '200':
          description: A list of assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Assignment'
    post:
      summary: Create a new assignment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignmentInput'
      responses:
        '201':
          description: Assignment created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
        '400':
          description: Bad request due to missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/assignments/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: The assignment ID
    delete:
      summary: Delete an assignment
      responses:
        '200':
          description: Assignment deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '404':
          description: Assignment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
    patch:
      summary: Update an assignment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                dueDate:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Assignment updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
components:
  schemas:
    Assignment:
      type: object
      properties:
        _id:
          type: string
          description: The unique identifier for the assignment
        title:
          type: string
        description:
          type: string
        dueDate:
          type: string
          format: date-time
    AssignmentInput:
      type: object
      required:
        - title
        - description
        - dueDate
      properties:
        title:
          type: string
        description:
          type: string
        dueDate:
          type: string
          format: date-time
    MessageResponse:
      type: object
      properties:
        msg:
          type: string
          example: "Message description here"